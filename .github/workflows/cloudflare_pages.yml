name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - public/**
      - .github/workflows/cloudflare_pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
      PROJECT_NAME: torah-pod
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Ensure Pages project exists
        run: npx wrangler@4 pages project create "$PROJECT_NAME" --production-branch main || true

      - name: Prepare public site
        env:
          ONBOARDING_WORKER_ENDPOINT: ${{ vars.ONBOARDING_WORKER_ENDPOINT }}
        run: |
          cp -R public public-dist
          python - <<'PY'
          import os
          from pathlib import Path

          endpoint = os.environ.get("ONBOARDING_WORKER_ENDPOINT", "").strip()
          if not endpoint:
              raise SystemExit("ONBOARDING_WORKER_ENDPOINT repo variable is not set.")

          path = Path("public-dist/onboard/index.html")
          html = path.read_text(encoding="utf-8")
          html = html.replace("__ONBOARDING_WORKER_ENDPOINT__", endpoint)
          if "__ONBOARDING_WORKER_ENDPOINT__" in html:
              raise SystemExit("Onboarding Worker endpoint placeholder was not replaced.")
          path.write_text(html, encoding="utf-8")
          PY

      - name: Deploy public site
        run: npx wrangler@4 pages deploy public-dist --project-name "$PROJECT_NAME" --branch main
