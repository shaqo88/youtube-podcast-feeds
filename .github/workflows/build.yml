name: Rebuild Feeds

on:
  workflow_dispatch:
    inputs:
      show:
        description: "Show slug. Leave empty to rebuild all enabled shows."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: podcast-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.0.2
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Build feeds
        env:
          SHOW: ${{ inputs.show }}
        run: |
          if [ -n "$SHOW" ]; then
            python -m podcast_feeds.build --show "$SHOW"
          else
            python -m podcast_feeds.build
          fi

      - name: Validate generated feeds
        env:
          SHOW: ${{ inputs.show }}
        run: |
          if [ -n "$SHOW" ]; then
            python -m podcast_feeds.validate --show "$SHOW"
          else
            python -m podcast_feeds.validate
          fi

      - name: Commit rebuilt feeds
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add public
          git diff --staged --quiet || git commit -m "Rebuild podcast feeds"
          git push

