name: Sync Podcast Feeds

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      show:
        description: "Show slug. Leave empty to sync all enabled shows."
        required: false
        default: ""
      youtube_auth_mode:
        description: "YouTube auth order."
        required: false
        default: "pot_then_cookie"
        type: choice
        options:
          - pot_then_cookie
          - cookie_then_pot
          - pot
          - cookie

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: podcast-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Set sync scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          SHOW: ${{ inputs.show }}
          YOUTUBE_AUTH_MODE: ${{ inputs.youtube_auth_mode }}
        run: |
          auth_mode="${YOUTUBE_AUTH_MODE:-pot_then_cookie}"
          echo "youtube_auth_mode=$auth_mode" >> "$GITHUB_OUTPUT"
          if [ "$EVENT_NAME" = "schedule" ] && [ -z "$SHOW" ]; then
            echo "source_args=--source-type drive --source-type existing_feed" >> "$GITHUB_OUTPUT"
            echo "needs_youtube=false" >> "$GITHUB_OUTPUT"
            echo "needs_cookie=false" >> "$GITHUB_OUTPUT"
            echo "Scheduled run: syncing stable non-YouTube sources only."
          else
            echo "source_args=" >> "$GITHUB_OUTPUT"
            echo "needs_youtube=true" >> "$GITHUB_OUTPUT"
            case "$auth_mode" in
              pot_then_cookie|cookie_then_pot|cookie)
                echo "needs_cookie=true" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "needs_cookie=false" >> "$GITHUB_OUTPUT"
                ;;
            esac
            echo "Manual or show-targeted run: syncing all configured sources with YouTube auth mode: $auth_mode."
          fi

      - name: Start bgutil PO-token provider
        if: steps.scope.outputs.needs_youtube == 'true'
        run: |
          if ! docker run --name bgutil-provider -d --init -p 4416:4416 brainicism/bgutil-ytdlp-pot-provider:1.3.1-deno; then
            echo "::warning::Could not start bgutil provider container; YouTube sync may fall back to cookies."
            exit 0
          fi
          for attempt in {1..30}; do
            if bash -c '</dev/tcp/127.0.0.1/4416' 2>/dev/null; then
              echo "bgutil provider is listening on 127.0.0.1:4416."
              exit 0
            fi
            sleep 1
          done
          echo "::warning::bgutil provider did not start listening on 127.0.0.1:4416; YouTube sync may fall back to cookies."
          docker logs bgutil-provider || true

      - name: Write YouTube cookies file
        if: steps.scope.outputs.needs_cookie == 'true'
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          printf '%s' "$YOUTUBE_COOKIES" > /tmp/yt_cookies.txt
          echo "Cookie file: $(wc -l < /tmp/yt_cookies.txt) lines, $(wc -c < /tmp/yt_cookies.txt) bytes"
          echo "YouTube/Google cookie lines: $(grep -Ec '(^|[[:space:]])\.(youtube|google)\.com[[:space:]]|(^|[[:space:]])(youtube|google)\.com[[:space:]]' /tmp/yt_cookies.txt || true)"
          echo "Secure Google session cookie lines: $(grep -Ec '__Secure-[0-9A-Z]*PSID|SAPISID|APISID|SSID|HSID|SID' /tmp/yt_cookies.txt || true)"
          if ! head -n 1 /tmp/yt_cookies.txt | grep -q '^# Netscape HTTP Cookie File'; then
            echo "::error::YOUTUBE_COOKIES is not a Netscape-format cookie file. Refresh it with scripts/set-youtube-cookies.ps1; older filtered secrets may be missing the required Netscape header."
            exit 1
          fi

      - name: Check mail notification secrets
        id: mail_secrets
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -n "$GMAIL_USER" ] && [ -n "$GMAIL_APP_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync episodes
        id: sync
        continue-on-error: true
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHOW: ${{ inputs.show }}
          SOURCE_ARGS: ${{ steps.scope.outputs.source_args }}
          YOUTUBE_AUTH_MODE: ${{ steps.scope.outputs.youtube_auth_mode }}
        run: |
          args=()
          if [ -n "$SHOW" ]; then
            args+=(--show "$SHOW")
          fi
          if [ -n "$SOURCE_ARGS" ]; then
            read -r -a source_args <<< "$SOURCE_ARGS"
            args+=("${source_args[@]}")
          fi
          python -m podcast_feeds.sync "${args[@]}"

      - name: Detect sync changes
        id: sync_changes
        if: always()
        run: |
          if git diff --quiet -- shows; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop failed sync with no changes
        if: steps.sync.outcome != 'success' && steps.sync_changes.outputs.changed != 'true'
        run: |
          echo "::error::Podcast sync failed before changing episode metadata. Skipping build and deploy."
          exit 1

      - name: Build feeds
        if: steps.sync.outcome == 'success' || steps.sync_changes.outputs.changed == 'true'
        env:
          SHOW: ${{ inputs.show }}
        run: |
          if [ -n "$SHOW" ]; then
            python -m podcast_feeds.build --show "$SHOW"
          else
            python -m podcast_feeds.build
          fi

      - name: Validate generated feeds
        if: steps.sync.outcome == 'success' || steps.sync_changes.outputs.changed == 'true'
        env:
          SHOW: ${{ inputs.show }}
        run: |
          if [ -n "$SHOW" ]; then
            python -m podcast_feeds.validate --show "$SHOW"
          else
            python -m podcast_feeds.validate
          fi

      - name: Commit successful sync
        if: steps.sync.outcome == 'success' || steps.sync_changes.outputs.changed == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add shows public
          git diff --staged --quiet || git commit -m "Sync podcast episodes"
          git push

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
        if: steps.sync.outcome == 'success' || steps.sync_changes.outputs.changed == 'true'

      - name: Prepare public site
        if: steps.sync.outcome == 'success' || steps.sync_changes.outputs.changed == 'true'
        env:
          ONBOARDING_WORKER_ENDPOINT: ${{ vars.ONBOARDING_WORKER_ENDPOINT }}
        run: |
          cp -R public public-dist
          python - <<'PY'
          import os
          from pathlib import Path

          endpoint = os.environ.get("ONBOARDING_WORKER_ENDPOINT", "").strip()
          if not endpoint:
              raise SystemExit("ONBOARDING_WORKER_ENDPOINT repo variable is not set.")

          path = Path("public-dist/onboard/index.html")
          html = path.read_text(encoding="utf-8")
          html = html.replace("__ONBOARDING_WORKER_ENDPOINT__", endpoint)
          if "__ONBOARDING_WORKER_ENDPOINT__" in html:
              raise SystemExit("Onboarding Worker endpoint placeholder was not replaced.")
          path.write_text(html, encoding="utf-8")
          PY

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        if: steps.sync.outcome == 'success' || steps.sync_changes.outputs.changed == 'true'
        with:
          path: public-dist

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
        if: steps.sync.outcome == 'success' || steps.sync_changes.outputs.changed == 'true'

      - name: Report partial sync failure
        if: always() && steps.sync.outcome != 'success' && steps.sync_changes.outputs.changed == 'true'
        run: |
          echo "One or more episodes failed. Successful episodes were preserved."
          exit 1

      - name: Notify on failure
        if: failure() && steps.mail_secrets.outputs.enabled == 'true'
        uses: dawidd6/action-send-mail@d38f3f7cd391cdebfe0d38efc3998b935e951c4f  # v16
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ env.GMAIL_USER }}
          password: ${{ env.GMAIL_APP_PASSWORD }}
          subject: "Podcast sync failed"
          to: ${{ env.GMAIL_USER }}
          from: ${{ env.GMAIL_USER }}
          body: "The YouTube podcast sync workflow failed. Successfully processed episodes were preserved."
