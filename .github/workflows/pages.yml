name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - public/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v6.0.0

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v5.0.0
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@d9fd2ed0bc143c50bf9bd10a555d592d4367bca4  # v4.0.5

