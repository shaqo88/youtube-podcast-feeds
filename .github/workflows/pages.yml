name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - public/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Prepare public site
        env:
          ONBOARDING_WORKER_ENDPOINT: ${{ vars.ONBOARDING_WORKER_ENDPOINT }}
        run: |
          cp -R public public-dist
          python - <<'PY'
          import os
          from pathlib import Path

          endpoint = os.environ.get("ONBOARDING_WORKER_ENDPOINT", "").strip()
          if not endpoint:
              raise SystemExit("ONBOARDING_WORKER_ENDPOINT repo variable is not set.")

          path = Path("public-dist/onboard/index.html")
          html = path.read_text(encoding="utf-8")
          html = html.replace("__ONBOARDING_WORKER_ENDPOINT__", endpoint)
          if "__ONBOARDING_WORKER_ENDPOINT__" in html:
              raise SystemExit("Onboarding Worker endpoint placeholder was not replaced.")
          path.write_text(html, encoding="utf-8")
          PY

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: public-dist

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
