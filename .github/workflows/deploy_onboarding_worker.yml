name: Deploy Onboarding Worker

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Deploy Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler@4 deploy --config workers/onboarding/wrangler.toml

      - name: Set Worker GitHub token
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ONBOARDING_GITHUB_TOKEN: ${{ secrets.ONBOARDING_GITHUB_TOKEN }}
        run: printf '%s' "$ONBOARDING_GITHUB_TOKEN" | npx wrangler@4 secret put GITHUB_TOKEN --config workers/onboarding/wrangler.toml
