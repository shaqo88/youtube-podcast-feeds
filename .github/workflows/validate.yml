name: Validate Podcast Feeds

on:
  schedule:
    - cron: '37 * * * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - podcast_feeds/**
      - public/**
      - requirements.txt
      - shows/**
  workflow_dispatch:
    inputs:
      show:
        description: "Show slug. Leave empty to validate all enabled shows."
        required: false
        default: ""
      network:
        description: "Validate published feed/artwork/media."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.0.2
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Build feeds
        env:
          SHOW: ${{ inputs.show }}
        run: |
          if [ -n "$SHOW" ]; then
            python -m podcast_feeds.build --show "$SHOW"
          else
            python -m podcast_feeds.build
          fi

      - name: Validate feeds
        env:
          SHOW: ${{ inputs.show }}
          NETWORK: ${{ inputs.network }}
        run: |
          args=""
          if [ -n "$SHOW" ]; then
            args="$args --show $SHOW"
          fi
          if [ "$NETWORK" = "true" ]; then
            args="$args --network"
          fi
          python -m podcast_feeds.validate $args

