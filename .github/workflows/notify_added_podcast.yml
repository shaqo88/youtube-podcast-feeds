name: Notify Added Podcast

on:
  push:
    branches:
      - main
    paths:
      - 'shows/**/config.yml'

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install YAML parser
        run: python -m pip install PyYAML==6.0.3

      - name: Detect added podcast configs
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          before="$BEFORE"
          if [ -z "$before" ] || [[ "$before" =~ ^0+$ ]]; then
            before="$(git rev-list --max-parents=0 "$AFTER")"
          fi

          git diff --diff-filter=A --name-only "$before" "$AFTER" -- 'shows/*/config.yml' > added-configs.txt
          if [ ! -s added-configs.txt ]; then
            echo "added=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "added=true" >> "$GITHUB_OUTPUT"

      - name: Build notification body
        if: steps.detect.outputs.added == 'true'
        id: body
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          from pathlib import Path

          import yaml

          paths = [
              line.strip()
              for line in Path("added-configs.txt").read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          shows = []
          for path_text in paths:
              path = Path(path_text)
              config = yaml.safe_load(path.read_text(encoding="utf-8")) or {}
              podcast = config.get("podcast") or {}
              slug = str(config.get("slug") or path.parts[1])
              title = str(podcast.get("title") or slug)
              author = str(podcast.get("author") or "")
              feed_url = str(podcast.get("feed_url") or f"https://shaqo88.github.io/youtube-podcast-feeds/{slug}/feed.xml")
              shows.append(
                  {
                      "slug": slug,
                      "title": title,
                      "author": author,
                      "feed_url": feed_url,
                      "config_path": path_text,
                  }
              )

          if len(shows) == 1:
              subject = f"Podcast added: {shows[0]['title']}"
          else:
              subject = f"Podcasts added: {len(shows)} shows"

          lines = [
              "A podcast was added to the Torah Pod feed system.",
              "",
              f"Commit: {os.environ['GITHUB_SHA']}",
              f"Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "",
          ]
          for show in shows:
              lines.extend(
                  [
                      f"## {show['title']}",
                      "",
                      f"- Slug: `{show['slug']}`",
                      f"- Author: {show['author'] or 'Not set'}",
                      f"- Feed: {show['feed_url']}",
                      f"- Config: `{show['config_path']}`",
                      "",
                  ]
              )

          Path("notification-subject.txt").write_text(subject, encoding="utf-8")
          body = "\n".join(lines)
          Path("notification-body.md").write_text(body, encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"subject={subject}\n")
              output.write("mail_body<<PODCAST_NOTIFICATION_BODY\n")
              output.write(body)
              output.write("\nPODCAST_NOTIFICATION_BODY\n")
          PY

      - name: Create GitHub notification issue
        if: steps.detect.outputs.added == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SUBJECT: ${{ steps.body.outputs.subject }}
        run: |
          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$SUBJECT" \
            --body-file notification-body.md \
            --assignee "$GITHUB_REPOSITORY_OWNER" \
          || gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "$SUBJECT" \
            --body-file notification-body.md

      - name: Check mail notification secrets
        if: steps.detect.outputs.added == 'true'
        id: mail
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PODCAST_NOTIFY_EMAIL_VAR: ${{ vars.PODCAST_NOTIFY_EMAIL }}
          PODCAST_NOTIFY_EMAIL_SECRET: ${{ secrets.PODCAST_NOTIFY_EMAIL }}
        run: |
          if [ -n "$GMAIL_USER" ] && [ -n "$GMAIL_APP_PASSWORD" ]; then
            notify_to="${PODCAST_NOTIFY_EMAIL_SECRET:-${PODCAST_NOTIFY_EMAIL_VAR:-$GMAIL_USER}}"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "to=$notify_to" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send email notification
        if: steps.detect.outputs.added == 'true' && steps.mail.outputs.enabled == 'true'
        continue-on-error: true
        uses: dawidd6/action-send-mail@d38f3f7cd391cdebfe0d38efc3998b935e951c4f  # v16
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.body.outputs.subject }}
          to: ${{ steps.mail.outputs.to }}
          from: ${{ secrets.GMAIL_USER }}
          body: ${{ steps.body.outputs.mail_body }}
