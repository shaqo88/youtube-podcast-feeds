name: Discover Platform Links

on:
  schedule:
    - cron: '43 5 * * 0'
  workflow_dispatch:
    inputs:
      show:
        description: "Show slug. Leave empty to scan all enabled shows."
        required: false
        default: ""

permissions:
  contents: write
  issues: write

concurrency:
  group: platform-link-discovery
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Discover verified platform links
        env:
          SHOW: ${{ inputs.show }}
          PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
          PODCASTINDEX_API_SECRET: ${{ secrets.PODCASTINDEX_API_SECRET }}
        run: |
          if [ -n "$SHOW" ]; then
            python -m podcast_feeds.discover_platform_links --show "$SHOW" --write --report platform-link-report.md
          else
            python -m podcast_feeds.discover_platform_links --write --report platform-link-report.md
          fi
          cat platform-link-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Check for manual review candidates
        id: candidates
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path

          report = Path("platform-link-report.md").read_text(encoding="utf-8")
          manual = report.split("## Manual review candidates", 1)[1].split("## Discovery errors", 1)[0]
          print(f"present={'false' if '- None' in manual else 'true'}")
          PY

      - name: Create or update manual review issue
        if: steps.candidates.outputs.present == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Platform link candidates"
          body_file="$(mktemp)"
          {
            echo "The platform-link discovery job found title-based candidates that were not auto-added."
            echo
            echo "Only exact RSS feed matches are written automatically. Review these manually before adding any link to \`podcast.platforms\`."
            echo
            cat platform-link-report.md
          } > "$body_file"
          number="$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n 1)"
          if [ -n "$number" ]; then
            gh issue edit "$number" --repo "$GITHUB_REPOSITORY" --body-file "$body_file"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body-file "$body_file"
          fi

      - name: Build feeds and portal
        run: python -m podcast_feeds.build

      - name: Validate generated feeds
        run: python -m podcast_feeds.validate

      - name: Commit platform link updates
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add shows public
          git diff --staged --quiet || git commit -m "Discover podcast platform links"
          git push
