name: YouTube Podcast Onboarding
description: Request a new podcast feed from a YouTube channel or playlist.
title: "YouTube podcast onboarding: <podcast title>"
labels:
  - youtube-onboarding
  - needs-approval
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a podcast feed from a YouTube channel or playlist.

        Torah Pod approval is required before a feed is created. A maintainer
        approves by adding the `approved` label.
  - type: input
    id: podcast_title
    attributes:
      label: Podcast title
      description: Optional. If blank, Torah Pod can use the speaker / rabbi name.
      placeholder: שיעורי הרב ...
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Speaker / rabbi
      placeholder: הרב ...
    validations:
      required: true
  - type: input
    id: feed_slug
    attributes:
      label: Feed slug
      description: Required. Lowercase English letters, numbers, and hyphens only. This becomes the feed URL path.
      placeholder: rav-example
    validations:
      required: true
  - type: input
    id: source_type
    attributes:
      label: Source type
      description: Use `YouTube channel`, `YouTube playlist`, `YouTube channel + Google Drive folder`, or `YouTube playlist + Google Drive folder`.
      placeholder: YouTube channel
    validations:
      required: true
  - type: input
    id: youtube_url
    attributes:
      label: YouTube URL
      description: Required for YouTube sources.
      placeholder: https://www.youtube.com/@channel
    validations:
      required: false
  - type: input
    id: drive_url
    attributes:
      label: Drive URL
      description: Required when adding a Drive folder too.
      placeholder: https://drive.google.com/drive/folders/...
    validations:
      required: false
  - type: input
    id: start_date
    attributes:
      label: Start date
      description: Videos before this date are ignored.
      placeholder: "2026-06-24"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Podcast description
      description: Optional. Torah Pod can use the YouTube channel description if this is blank.
    validations:
      required: false
  - type: input
    id: artwork
    attributes:
      label: Artwork URL
      description: Optional. Torah Pod can use the YouTube channel image if this is blank.
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      description: Optional.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional special instructions.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I understand this request requires Torah Pod approval before a feed is created.
          required: true
