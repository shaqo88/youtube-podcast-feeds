name: YouTube Podcast Onboarding
description: Request a new podcast feed from a YouTube channel.
title: "YouTube podcast onboarding: <podcast title>"
labels:
  - youtube-onboarding
  - needs-approval
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a podcast feed from a YouTube channel.

        Torah Pod approval is required before a feed is created.
  - type: input
    id: podcast_title
    attributes:
      label: Podcast title
      placeholder: שיעורי הרב ...
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Speaker / rabbi
      placeholder: הרב ...
    validations:
      required: true
  - type: input
    id: channel_url
    attributes:
      label: YouTube channel URL
      placeholder: https://www.youtube.com/@channel
    validations:
      required: true
  - type: input
    id: start_date
    attributes:
      label: Start date
      description: Videos before this date are ignored.
      placeholder: "2026-06-24"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Podcast description
      description: Optional. Torah Pod can use the YouTube channel description if this is blank.
    validations:
      required: false
  - type: input
    id: artwork
    attributes:
      label: Artwork URL
      description: Optional. Torah Pod can use the YouTube channel image if this is blank.
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      description: Optional.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional special instructions.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I understand this request requires Torah Pod approval before a feed is created.
          required: true
