name: Drive Podcast Onboarding
description: Request a new podcast feed from a Google Drive folder.
title: "Drive podcast onboarding: <podcast title>"
labels:
  - drive-onboarding
  - needs-approval
body:
  - type: markdown
    attributes:
      value: |
        Use this form to request a podcast feed from a Google Drive folder.

        Before submitting, share the Drive folder with this service account as **Viewer**:

        `podcast-sync@torah-pod-podcast-sync.iam.gserviceaccount.com`

        Finished files should be named:

        `YYYY-MM-DD - Episode Title.ext`

        Torah Pod approval is required before a feed is created.
  - type: input
    id: podcast_title
    attributes:
      label: Podcast title
      description: Optional. If blank, Torah Pod can use the speaker / rabbi name.
      placeholder: שיעורי הרב ...
    validations:
      required: false
  - type: input
    id: author
    attributes:
      label: Speaker / rabbi
      placeholder: הרב ...
    validations:
      required: true
  - type: input
    id: drive_folder
    attributes:
      label: Google Drive folder URL
      placeholder: https://drive.google.com/drive/folders/...
    validations:
      required: true
  - type: input
    id: start_date
    attributes:
      label: Start date
      description: Files before this date are ignored.
      placeholder: "2026-06-24"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Podcast description
      description: Optional.
    validations:
      required: false
  - type: input
    id: artwork
    attributes:
      label: Artwork URL
      description: Optional. Square image preferred, 1400-3000 px.
      placeholder: https://...
    validations:
      required: false
  - type: input
    id: contact_email
    attributes:
      label: Contact email
      description: Optional.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Optional special instructions.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: The Drive folder is shared with the service account as Viewer.
          required: true
        - label: Finished files will be named `YYYY-MM-DD - Episode Title.ext`.
          required: true
        - label: I understand this request requires Torah Pod approval before a feed is created.
          required: true
